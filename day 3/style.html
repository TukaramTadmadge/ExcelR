<!DOCTYPE html>
<html>
<head>
    <title>All CSS Types</title>

    <!-- Internal CSS -->
    <style>
        body {
            font-family: Arial;
        }

        h2 {
            color: blue;
        }

        .box {
            background-color: lightgray;
            padding: 10px;
        }
    </style>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1 style="color: red;">Inline CSS Example</h1>

    <h2>Internal CSS Example</h2>

    <p class="box">This is styled using Internal CSS (class selector)</p>

    <p id="para">This is styled using External CSS</p>

</body>
</html>
