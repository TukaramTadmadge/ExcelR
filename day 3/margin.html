<!DOCTYPE html>
<html>
<head>
    <title>Margin & Padding All Properties</title>
    <style>
        .box {
            background-color: lightgreen;
            border: 2px solid black;

            /* Padding (inside space) */
            padding-top: 10px;
            padding-right: 20px;
            padding-bottom: 30px;
            padding-left: 40px;

            /* Margin (outside space) */
            margin-top: 15px;
            margin-right: 25px;
            margin-bottom: 35px;
            margin-left: 45px;
        }

        .box2 {
            background-color: lightcoral;
            border: 2px solid black;

            /* Shortcut (top right bottom left) */
            padding: 10px 20px 30px 40px;
            margin: 20px 30px 40px 50px;
        }
    </style>
</head>
<body>

    <div class="box">
        Box 1: Using individual margin & padding properties
    </div>

    <div class="box2">
        Box 2: Using shorthand margin & padding
    </div>

</body>
</html>
