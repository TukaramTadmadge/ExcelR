<!DOCTYPE html>
<html>
<head>
<style>

* {
  font-family: Arial;
}

p {
  color: blue;
}

#heading {
  color: red;
}

.box {
  border: 2px solid black;
  padding: 10px;
}

h1, h2 {
  text-align: center;
}

div p {
  color: green;
}

div > span {
  color: orange;
}

h2 + p {
  background-color: lightgray;
}

h2 ~ p {
  border: 1px dashed black;
}

input[type="text"] {
  border: 2px solid blue;
}

a:hover {
  color: purple;
}

p::first-letter {
  font-size: 25px;
}

li:first-child {
  color: red;
}

li:last-child {
  color: green;
}

li:nth-child(2) {
  color: orange;
}

</style>
</head>

<body>

<h1 id="heading">Heading 1</h1>
<h2>Heading 2</h2>

<p>Paragraph 1</p>
<p>Paragraph 2</p>

<div class="box">
  <p>Inside div paragraph</p>
  <span>Direct child span</span>
  <section>
    <p>Nested paragraph</p>
  </section>
</div>

<input type="text" placeholder="Enter name">

<br><br>

<a href="#">Hover Link</a>

<ul>
  <li>Item 1</li>
  <li>Item 2</li>
  <li>Item 3</li>
</ul>

</body>
</html>
