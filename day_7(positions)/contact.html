<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Little Taco Shop</title>
</head>
<body>

    <!-- Header -->
    <h1>Contact Us</h1>

    <!-- Navigation -->
    <ul>
        <li><a href="home.html">Home</a></li>
        <li><a href="about.html">About Lts</a></li>
        <li><a href="menu.html">Our Menu</a></li>
        <li><a href="storehoures.html">Store Hours</a></li>
    </ul>

    
    <img src="taco3.jpg" alt="Tacos and a Drink" width="250">
    <p>Tacos And a Drink</p>

    <!-- Contact Form Section -->
    <h2>Our Contact Form</h2>

    <fieldset>
        <legend>Send Us Message</legend>

        <form action="#" method="post">

            <p>
                <label for="name">Name :</label>
                <input type="text" id="name" name="name" placeholder="Enter Name">
            </p>

            <p>
                <label for="email">Email :</label>
                <input type="email" id="email" name="email" placeholder="Enter Email">
            </p>

            <p>
                <label for="message">Your Message :</label><br>
                <textarea id="message" name="message" rows="6" cols="30"></textarea>
            </p>

            <input type="submit" value="Send">
            <input type="reset" value="Reset">

        </form>
    </fieldset>

    <!-- Location -->
    <h2>Our Location</h2>

    <p>
        555 Taco Temptation Lane, Suite T<br>
        Taco Town, CA 90210<br>
        Phone: 555-555-5555
    </p>

    <!-- Back to Top -->
    <a href="#">Back to Top</a>

    <hr>

    <!-- Footer -->
    <p>&copy; The Little Taco Shop</p>

</body>
</html>
