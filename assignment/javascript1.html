<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Loops, Operators and Conditions</title>
</head>
<body>

    <h2>Open Console to See Output</h2>

    <script>

        // Operators and Conditions
        let num1 = 20;
        let num2 = 10;

        if (num1 > num2) {
            console.log("Num1 is greater");
        } else {
            console.log("Num2 is greater");
        }

        // While Loop
        let i = 1;

        while (i <= 5) {
            console.log("While loop iteration " + i);
            i++;
        }

        // For Loop
        for (let j = 1; j <= 5; j++) {
            console.log("For loop iteration " + j);
        }

        // Do-While Loop
        let k = 1;

        do {
            console.log("Do-While loop iteration " + k);
            k++;
        } while (k <= 5);

        // Switch Condition
        let day = 1;

        switch(day) {
            case 1:
                console.log("It's Monday");
                break;

            case 2:
                console.log("It's Tuesday");
                break;

            default:
                console.log("Invalid Day");
        }

    </script>

</body>
</html>
